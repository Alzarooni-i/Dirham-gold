<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Darham Gold</title>



<style>

body{

    margin:0;

    font-family:Arial,sans-serif;

    background:#f5f5f5;

    color:#222;

}



.container{

    max-width:500px;

    margin:auto;

    padding:20px;

}



.card{

    background:white;

    padding:20px;

    border-radius:20px;

    margin-bottom:20px;

    box-shadow:0 4px 15px rgba(0,0,0,0.08);

}



h1,h2,h3{

    text-align:center;

}



input,select,button{

    width:100%;

    padding:14px;

    margin-top:10px;

    border-radius:12px;

    border:1px solid #ccc;

    box-sizing:border-box;

    font-size:16px;

}



button{

    background:#c8a74e;

    color:white;

    border:none;

    font-weight:bold;

    cursor:pointer;

}



.result{

    background:#f8f3df;

    padding:12px;

    border-radius:12px;

    margin-top:10px;

    font-weight:bold;

}



.lang-btn{

    background:#222;

    margin-bottom:15px;

}



.small{

    text-align:center;

    color:#666;

}

</style>

</head>



<body>



<div class="container">



<button class="lang-btn" onclick="toggleLanguage()" id="langBtn">

العربية

</button>



<div class="card">

<h1>Darham Gold</h1>

<p class="small" id="subtitle">UAE Gold Calculator</p>



<h3 id="ounceTitle">Global Gold Ounce Price</h3>



<input type="number" id="ounce" placeholder="Update Global Price">



<input type="number" id="usd" value="3.6725">



<div class="result" id="prices">

Waiting for prices...

</div>

</div>



<div class="card">

<h2 id="normalTitle">Normal Calculation</h2>



<input type="number" id="weight" placeholder="Gold Weight in Grams">



<select id="karat">

<option value="24">24K</option>

<option value="22">22K</option>

<option value="21">21K</option>

<option value="18">18K</option>

</select>



<input type="number" id="making" placeholder="Making Charge per Gram">



<button onclick="calculatePrice()" id="calcBtn">

Calculate Final Price

</button>



<div class="result" id="finalResult">

Waiting for calculation...

</div>

</div>



<div class="card">

<h2 id="reverseTitle">Reverse Making Charge Calculator</h2>



<input type="number" id="reverseWeight" placeholder="Gold Weight in Grams">



<select id="reverseKarat">

<option value="24">24K</option>

<option value="22">22K</option>

<option value="21">21K</option>

<option value="18">18K</option>

</select>



<input type="number" id="totalPrice" placeholder="Total Price with VAT">



<button onclick="calculateReverse()" id="reverseBtn">

Calculate Making Charge

</button>



<div class="result" id="reverseResult">

Waiting for calculation...

</div>

</div>



</div>



<script>



let currentLang = "en";



function gramPrice(karat){



let ounce =

parseFloat(document.getElementById("ounce").value) || 0;



let usd =

parseFloat(document.getElementById("usd").value) || 3.6725;



let gram24 = (ounce / 31.1035) * usd;



return gram24 * (karat / 24);

}



function updatePrices(){



let html = "";



[24,22,21,18].forEach(k=>{



html += `

<div>

${k}K : ${gramPrice(k).toFixed(2)} AED

</div>

`;



});



document.getElementById("prices").innerHTML = html;

}



function calculatePrice(){



let weight =

parseFloat(document.getElementById("weight").value) || 0;



let karat =

parseFloat(document.getElementById("karat").value);



let making =

parseFloat(document.getElementById("making").value) || 0;



let gold = gramPrice(karat);



let subtotal = (gold + making) * weight;



let final = subtotal * 1.05;



document.getElementById("finalResult").innerHTML =

`Final Price: ${final.toFixed(2)} AED`;

}



function calculateReverse(){



let weight =

parseFloat(document.getElementById("reverseWeight").value) || 0;



let karat =

parseFloat(document.getElementById("reverseKarat").value);



let total =

parseFloat(document.getElementById("totalPrice").value) || 0;



let beforeVat = total / 1.05;



let goldOnly = gramPrice(karat) * weight;



let makingTotal = beforeVat - goldOnly;



let makingGram = makingTotal / weight;



document.getElementById("reverseResult").innerHTML =

`Making Charge: ${makingGram.toFixed(2)} AED per gram`;

}



document.getElementById("ounce").addEventListener("input",updatePrices);



function toggleLanguage(){



if(currentLang==="en"){



currentLang="ar";



document.documentElement.lang="ar";

document.body.style.direction="rtl";



document.getElementById("subtitle").innerText =

"حاسبة الذهب الإماراتية الكاملة";



document.getElementById("ounceTitle").innerText =

"سعر الأونصة العالمي";



document.getElementById("normalTitle").innerText =

"الحساب العادي";



document.getElementById("reverseTitle").innerText =

"الحساب العكسي للمصنعية";



document.getElementById("calcBtn").innerText =

"احسب السعر النهائي";



document.getElementById("reverseBtn").innerText =

"احسب المصنعية";



document.getElementById("langBtn").innerText =

"English";



}else{



currentLang="en";



location.reload();



}



}



</script>



</body>

</html>
